name: trawly-e2e

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - name: Exercise CLI formats and inputs
        run: |
          node dist/cli.js inspect --lockfile tests/fixtures/package-lock.json --format json --output artifacts/npm.json --no-risk
          node dist/cli.js inspect --lockfile tests/fixtures/pnpm-lock.yaml --format markdown --output artifacts/pnpm.md --no-risk
          node dist/cli.js inspect tests/fixtures/yarn-v1 --format json --output artifacts/yarn-v1.json --no-risk
          node dist/cli.js inspect tests/fixtures/yarn-berry --format json --output artifacts/yarn-berry.json --no-risk
          node dist/cli.js inspect --sbom tests/fixtures/cyclonedx.json --format json --output artifacts/cdx-json.json --no-risk
          node dist/cli.js inspect --sbom tests/fixtures/cyclonedx.xml --format json --output artifacts/cdx-xml.json --no-risk
          node dist/cli.js inspect --sbom tests/fixtures/spdx.json --format json --output artifacts/spdx-json.json --no-risk
          node dist/cli.js inspect --sbom tests/fixtures/spdx.spdx --format json --output artifacts/spdx-tv.json --no-risk
          node dist/cli.js inspect --lockfile tests/fixtures/package-lock.json --format sarif --output artifacts/trawly.sarif --no-risk
          node dist/cli.js inspect --lockfile tests/fixtures/package-lock.json --write-baseline artifacts/baseline.json --format json --output artifacts/baseline-write.json --no-risk
          node dist/cli.js scan --lockfile tests/fixtures/package-lock.json --baseline artifacts/baseline.json --fail-on low --format json --output artifacts/baseline-scan.json --no-risk
          cat > artifacts/trawly.toml <<'EOF'
          failOn = "none"
          risk = false

          [[ignore]]
          id = "GHSA-xvch-5gv4-984h"
          package = "minimist"
          ecosystem = "npm"
          expires = "2026-12-31"
          reason = "E2E ignore fixture"
          EOF
          node dist/cli.js inspect --lockfile tests/fixtures/package-lock.json --config artifacts/trawly.toml --format json --output artifacts/config-ignore.json
          node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('artifacts/config-ignore.json','utf8')); if (j.ignoredFindings.length !== 1) throw new Error('expected one ignored finding');"
          mkdir -p artifacts/risk
          cat > artifacts/risk/package-lock.json <<'EOF'
          {
            "lockfileVersion": 3,
            "packages": {
              "": {
                "dependencies": {
                  "fresh-risk-pkg": "1.0.0"
                }
              },
              "node_modules/fresh-risk-pkg": {
                "version": "1.0.0",
                "resolved": "https://evil.example/fresh-risk-pkg/-/fresh-risk-pkg-1.0.0.tgz",
                "hasInstallScript": true
              }
            }
          }
          EOF
          node <<'NODE' &
          const http = require("node:http");
          const day = 24 * 60 * 60 * 1000;
          const payload = {
            time: {
              created: new Date(Date.now() - 5 * day).toISOString(),
              "1.0.0": new Date(Date.now() - day).toISOString()
            }
          };
          http.createServer((req, res) => {
            res.writeHead(200, { "content-type": "application/json" });
            res.end(JSON.stringify(payload));
          }).listen(4873, "127.0.0.1");
          NODE
          registry_pid=$!
          trap 'kill "$registry_pid" 2>/dev/null || true' EXIT
          sleep 1
          TRAWLY_NPM_REGISTRY_URL=http://127.0.0.1:4873 node dist/cli.js inspect --lockfile artifacts/risk/package-lock.json --format json --output artifacts/risk.json
          node -e "const fs=require('fs'); const ids=JSON.parse(fs.readFileSync('artifacts/risk.json','utf8')).findings.map(f=>f.id).sort(); const expected=['TRAWLY-INSTALL-SCRIPT','TRAWLY-NEW-PACKAGE','TRAWLY-NEW-VERSION','TRAWLY-UNEXPECTED-REGISTRY']; for (const id of expected) if (!ids.includes(id)) throw new Error('missing risk signal '+id+' in '+ids.join(','));"
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: artifacts/trawly.sarif
          category: trawly-cli
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cli-artifacts
          path: artifacts

  composite-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          path: .
          fail-on: none
          upload-sarif: "true"
          sarif-output: trawly-action.sarif
          markdown-output: trawly-action.md
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: action-artifacts
          path: |
            trawly-action.sarif
            trawly-action.md
