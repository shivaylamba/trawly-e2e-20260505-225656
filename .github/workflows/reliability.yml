name: trawly-reliability

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  corpus-differential-and-stress:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:corpus
      - run: npm run test:differential
      - run: npm run test:stress
