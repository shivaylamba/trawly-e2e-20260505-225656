name: trawly
description: Scan dependency lockfiles and SBOMs with trawly.
inputs:
  path:
    description: Project directory to scan.
    required: false
    default: "."
  fail-on:
    description: Severity threshold for failing the job.
    required: false
    default: "high"
  config:
    description: Optional trawly.toml path.
    required: false
    default: ""
  baseline:
    description: Optional trawly baseline file.
    required: false
    default: ""
  sarif-output:
    description: SARIF output path.
    required: false
    default: "trawly.sarif"
  markdown-output:
    description: Markdown output path.
    required: false
    default: "trawly.md"
  upload-sarif:
    description: Upload SARIF to GitHub code scanning.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: 20
    - name: Build trawly
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        npm ci
        npm run build
    - name: Run trawly
      shell: bash
      run: |
        set +e
        args=(scan "${{ inputs.path }}" --fail-on "${{ inputs.fail-on }}")
        if [[ -n "${{ inputs.config }}" ]]; then
          args+=(--config "${{ inputs.config }}")
        fi
        if [[ -n "${{ inputs.baseline }}" ]]; then
          args+=(--baseline "${{ inputs.baseline }}")
        fi
        node "$GITHUB_ACTION_PATH/dist/cli.js" "${args[@]}" --format sarif --output "${{ inputs.sarif-output }}"
        status=$?
        inspect_args=(inspect "${{ inputs.path }}")
        if [[ -n "${{ inputs.config }}" ]]; then
          inspect_args+=(--config "${{ inputs.config }}")
        fi
        if [[ -n "${{ inputs.baseline }}" ]]; then
          inspect_args+=(--baseline "${{ inputs.baseline }}")
        fi
        node "$GITHUB_ACTION_PATH/dist/cli.js" "${inspect_args[@]}" --format markdown --output "${{ inputs.markdown-output }}" || true
        echo "$status" > "$RUNNER_TEMP/trawly-exit-code"
        exit 0
    - name: Upload SARIF
      if: ${{ inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs.sarif-output }}
        category: trawly
    - name: Preserve trawly exit code
      shell: bash
      run: exit "$(cat "$RUNNER_TEMP/trawly-exit-code")"
